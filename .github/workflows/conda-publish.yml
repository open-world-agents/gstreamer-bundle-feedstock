name: Build and Upload Conda Package

on:
  push:
    branches: [main]
    paths:
      - 'recipe/**'
      - '.github/workflows/conda-publish.yml'
  pull_request:
    paths:
      - 'recipe/**'
      - '.github/workflows/conda-publish.yml'

jobs:
  build-upload:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Set up Conda
        uses: conda-incubator/setup-miniconda@v4
        with:
          miniconda-version: "latest"
          channels: conda-forge
          conda-remove-defaults: "true"

      - name: Install conda-build and anaconda-client
        shell: bash -l {0}
        run: |
          conda install -n base -y conda-build anaconda-client

      - name: Build package
        shell: bash -l {0}
        run: |
          conda run -n base --no-capture-output conda build recipe --output-folder=output

      - name: Upload to Anaconda.org
        # Only upload when pushing to main branch
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        env:
          ANACONDA_API_TOKEN: ${{ secrets.ANACONDA_API_TOKEN }}
        shell: bash -l {0}
        run: |
          conda run -n base --no-capture-output anaconda upload output/noarch/*.conda --user open-world-agents --force
